name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned to 1.93: Rust 1.94+ clippy overflows the query depth limit while
      # computing the layout of matrix-sdk's huge `Client::sync()` future
      # ("queries overflow the depth limit!"). It's a regression in the
      # dependency's generated code that we can't edit. Revisit when a newer
      # matrix-sdk or clippy fixes it.
      - uses: dtolnay/rust-toolchain@1.93
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      # Enforce the declared minimum supported Rust version.
      - run: cargo check --all-targets

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-audit
      # Fails on known security vulnerabilities in the dependency tree.
      - run: cargo audit
