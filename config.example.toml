[smtp]
# Bind address (must be local)
bind = "127.0.0.1:2525"
# Maximum message size in bytes
max_message_size = 10485760  # 10MB
# Per-read timeout in seconds (how long to wait for the next line)
timeout = 30
# Maximum number of simultaneous connections; excess are rejected with 421
max_connections = 100
# Maximum lifetime of a single SMTP session in seconds (bounds slow/stuck
# connections beyond what the per-read timeout catches)
max_session_seconds = 300

[matrix]
# Homeserver URL
homeserver = "https://matrix.org"
# User ID (@user:server.com)
user_id = "@bot:example.com"
# Device display name
device_name = "chimney-post"
# Default room ID. Emails that match no routing rule (see [[matrix.routes]]
# below) are sent here, so this is also the only room needed when no rules
# are configured.
room_id = "!roomid:example.com"
# Store path for E2EE keys (secure this!)
store_path = "/var/lib/chimney-post/matrix-store"
# Require the room to be encrypted before sending (default: true).
# Set to false only if you intentionally use a non-E2EE room.
# require_e2ee = true

# MiniJinja template for formatting messages sent to Matrix.
# Available variables: from, to, subject, body
# All variables are strings; from and subject are empty when not present in
# the email, so use {% if from %} to conditionally include them.
# If omitted, the built-in default template is used (shows From/To/Subject
# headers followed by the body).
# See https://docs.rs/minijinja for full template syntax.
#
# Example – compact format showing only subject and body:
#   message_template = "[{{ subject }}] {{ body }}"
#
# Default template (for reference):
# message_template = """
# {%- if from %}From: {{ from }}
# {% endif -%}
# {%- if to %}To: {{ to }}
# {% endif -%}
# {%- if subject %}Subject: {{ subject }}{% else %}Subject: (none){% endif %}
#
# {%- if body and body is string and body | trim %}
# {{ body }}
# {%- else %}
# (empty message body)
# {%- endif %}"""

# Optional room-routing rules (like mailrise, but for Matrix rooms). Each rule
# selects emails by recipient (`to`, matched against any SMTP RCPT TO) and/or
# sender (`from`, matched against the SMTP MAIL FROM) and sends them to its own
# room. Matching is case-insensitive. Rules are evaluated top to bottom and the
# first match wins; emails matching no rule fall back to `room_id` above.
#
# Each rule must set `room_id` and at least one of `to` / `from`. When both are
# set, BOTH must match (logical AND).
#
# [[matrix.routes]]
# # Anything addressed to alerts@chimney -> the alerts room.
# to = "alerts@chimney"
# room_id = "!alerts:example.com"
#
# [[matrix.routes]]
# # Anything sent by Nextcloud -> the Nextcloud room.
# from = "nextcloud@server.example.com"
# room_id = "!nextcloud:example.com"
#
# [[matrix.routes]]
# # Only cron mail addressed to ops@chimney -> the ops room.
# to = "ops@chimney"
# from = "root@server.example.com"
# room_id = "!ops:example.com"

[matrix.credentials]
# Password (prefer environment variable)
password = "${MATRIX_PASSWORD}"
# Or use access token
# access_token = "${MATRIX_ACCESS_TOKEN}"
# Device ID. REQUIRED with access_token, and STRONGLY RECOMMENDED with password
# auth: pinning a stable device_id makes every login reuse the same Matrix
# device. Without it, a password login creates a brand-new device on every
# start -- orphaning devices on your account and forcing a crypto-store reset
# each restart. Pick any stable string (e.g. "chimney-post").
device_id = "chimney-post"

[logging]
# Trace, Debug, Info, Warn, Error
level = "info"
# Log format: json or pretty
format = "json"

[queue]
# Maximum retry attempts
max_retries = 5
# Retry backoff in seconds (exponential; capped at 900s)
retry_backoff = 60
# Path to the persistent SQLite outbox. Accepted emails are written here before
# being acknowledged and only removed once delivered to Matrix, so messages
# survive restarts and crashes. Must be writable by the service user.
db_path = "/var/lib/chimney-post/queue.db"
# Maximum number of messages held in the outbox before new mail is refused with
# a temporary 451 (backpressure, e.g. while Matrix is unreachable). 0 = unlimited.
max_len = 10000
